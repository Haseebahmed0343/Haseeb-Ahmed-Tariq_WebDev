<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="registration-container">
      <h2>Create Your Account</h2>
      <form id="registrationForm">
        <div class="form-group">
          <label>Full Name</label>
          <input
            type="text"
            id="fullName"
            placeholder="Enter your full name"
            required
          />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="example@gmail.com"
            required
          />
          <span class="error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="At least 8 chars, 1 number"
            required
          />
          <span class="error" id="passwordError"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="phone" placeholder="1234567890" required />
            <span class="error" id="phoneError"></span>
          </div>
          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" required />
            <span class="error" id="dobError"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Country</label>
            <select id="country" required>
              <option value="">Select Country</option>
              <option value="Pakistan">Pakistan</option>
              <option value="USA">USA</option>
              <option value="UK">UK</option>
            </select>
          </div>
          <div class="form-group">
            <label>City</label>
            <select id="city" required disabled>
              <option value="">Select City</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Profile Image</label>
          <input type="file" id="profileImage" accept="image/*" />
          <div id="imagePreview" class="preview-box">No image selected</div>
        </div>

        <button type="submit" id="submitBtn" disabled>Register Now</button>
      </form>
    </div>

    <div id="summaryModal" class="modal">
      <div class="modal-content">
        <h3>Registration Successful!</h3>
        <div id="summaryData"></div>
        <button onclick="closeModal()">Close & Refresh</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
