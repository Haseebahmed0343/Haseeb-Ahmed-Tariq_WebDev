<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgb(230, 238, 250);
        margin: 0;
        font-family: Arial, sans-serif;
      }
      .container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        width: 350px;
        padding: 30px;
        text-align: center;
      }
      .form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .form input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
      .form button {
        background: #4f46e5;
        color: #fff;
        font-weight: bold;
        padding: 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      .form label {
        text-align: left;
        font-size: 14px;
      }
      .link {
        margin-top: 15px;
        font-size: 14px;
      }
      .link a {
        color: #4f46e5;
        text-decoration: none;
      }
      .link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Login</h1>
      <form class="form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" minlength="8" required />

        <button type="submit">Login</button>
      </form>
      <div class="link">
        Don't have an account? <a href="signup.html">Signup</a>
      </div>
    </div>
  </body>
</html>
