<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>two-column-layout</title>
  </head>
  <style>
    /* General Reset */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: sans-serif;
}

.flex-container {
  display: flex;
  flex-wrap: wrap; /* Allows stacking on mobile */
  min-height: 100vh;
}

.side {
  width: 100%; /* Default to full width for mobile */
}

/* Image Side Styling */
.image-side img {
  width: 100%;
  height: 100%;
  min-height: 300px; /* Ensures image is visible on mobile */
  object-fit: cover; /* Prevents image distortion */
  display: block;
}

/* Form Side Styling */
.form-side {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  background-color: #f9f9f9;
}

.contact-form {
  width: 100%;
  max-width: 400px;
}

.input-group {
  margin-bottom: 15px;
}

.input-group label {
  display: block;
  margin-bottom: 5px;
  font-size: 0.9rem;
}

.input-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

button {
  width: 100%;
  padding: 12px;
  background-color: #2563eb;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}
h2 {
  margin-bottom: 20px;
  color: #333;
}

@media (min-width: 768px) {
  .side {
    width: 50%; 
  }
}
  </style>
  <body>
    <div class="flex-container">
      <div class="side image-side">
        <img
          src="./assets/layoutpic.jpg"
          alt="Developer Workspace"
        />
      </div>

      <div class="side form-side">
        <form class="contact-form">
          <h2>Join the Community</h2>
          <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Haseeb Ahmed" />
          </div>
          <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="example@email.com" />
          </div>
          <button type="submit">Submit</button>
        </form>
      </div>
    </div>
    
  </body>
</html>
