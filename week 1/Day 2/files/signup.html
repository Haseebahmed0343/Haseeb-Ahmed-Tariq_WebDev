<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: "Roboto";
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url("./assets/signup.jpg");
        background-size: cover;
        background-position: center;
      }
      .container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        width: 350px;
        padding: 30px;
        text-align: center;
        margin: 100px auto;
      }
      .form {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .form input {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
      }
      .form input:focus {
        border-color: #007bff;
      }
      .form button {
        background: #007bff;
        color: white;
        font-weight: bold;
        padding: 12px;
        border: none;
        border-radius: 8px;
        width: 100%;
      }
      .form button:hover {
        background: #0056b3;
        transition: ease 0.3s;
      }
      .form label {
        text-align: left;
        font-size: 14px;
      }
      .link {
        margin-top: 15px;
        font-size: 14px;
      }
      .link a {
        color: #4f46e5;
        text-decoration: none;
      }
      .link a:hover {
        text-decoration: underline;
        transition: ease 0.3s;
      }
      h1 {
        font-size: 24px;
        color: #333;
      }
      .header {
        position: relative;
        height: 60px;
        background: #5ac5f7;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 20px;
      }

      .logo {
        font-size: 20px;
        font-weight: bold;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 20px;
        margin: 0;
        padding: 0;
      }

      nav a {
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s;
      }

      nav a:hover {
        color: #ffd700;
      }
      @media (max-width: 768px) {
        .header {
          height: auto;
          flex-direction: column;
          padding: 15px;
          gap: 15px;
        }

        nav ul {
          flex-direction: column;
          gap: 10px;
          text-align: center;
        }

        .container {
          width: 95%;
          padding: 20px;
          margin: 50px auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">MyWebsite</div>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </div>

    <div class="container">
      <h1>Create Account</h1>
      <form class="form">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"
          required
        />

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
        />

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          minlength="8"
          required
        />

        <label for="confirm-password">Confirm Password</label>
        <input
          type="password"
          id="confirm-password"
          name="confirm-password"
          placeholder="Re-enter your password"
          minlength="8"
          required
        />

        <button type="submit">Create Account</button>
      </form>
      <div class="link">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </body>
</html>
