<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treasure Hunt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-card">
            <h1>Guess the Number</h1>
            <p class="subtitle">Pick a number between 1 and 100</p>

            <div class="input-section">
                <input
                    type="number"
                    id="numberInput"
                    placeholder="00"
                    min="1"
                    max="100"
                    required
                />
                <button id="guessButton" type="submit" class="btn btn-primary">Search</button>
            </div>

            <div class="action-buttons">
                <button id="playAgainButton" class="btn btn-success hidden">Play Again</button>

            </div>

            <div class="feedback">
                <p id="message"></p>
                <p id="attempts"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
