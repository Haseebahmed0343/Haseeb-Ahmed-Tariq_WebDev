<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <title>Your Cart</title>
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo">MiniStore</a>
      <div class="nav-links">
        <a href="index.html">Back to Store</a>
      </div>
    </nav>
    <div class="container">
      <h2>Shopping Cart</h2>
      <div id="cart-items" style="margin-top: 20px"></div>
      <div style="margin-top: 20px; text-align: right">
        <h3>Total: $<span id="total-price">0</span></h3>
        <a href="checkout.html" class="btn" style="margin-top: 10px"
          >Proceed to Checkout</a
        >
      </div>
    </div>

    <script>
      function renderCart() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const container = document.getElementById("cart-items");
        let total = 0;

        container.innerHTML = cart
          .map((item, index) => {
            total += item.price * item.quantity;
            return `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div style="flex:1">
                            <h4>${item.name}</h4>
                            <p>$${item.price}</p>
                        </div>
                        <div>
                            <button onclick="changeQty(${index}, -1)">-</button>
                            <span style="margin:0 10px">${item.quantity}</span>
                            <button onclick="changeQty(${index}, 1)">+</button>
                        </div>
                        <button class="btn btn-secondary" style="margin-left:20px" onclick="removeItem(${index})">Delete</button>
                    </div>
                `;
          })
          .join("");
        document.getElementById("total-price").innerText = total;
      }

      function changeQty(index, delta) {
        let cart = JSON.parse(localStorage.getItem("cart"));
        cart[index].quantity += delta;
        if (cart[index].quantity < 1) cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
      }

      function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem("cart"));
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
      }

      renderCart();
    </script>
  </body>
</html>
