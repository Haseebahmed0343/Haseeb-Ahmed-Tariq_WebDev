<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Home - MiniStore</title>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">MiniStore</a>
        <div class="nav-links">
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="grid" id="product-list"></div>

    <script>
        if(!localStorage.getItem('isLoggedIn')) window.location.href = 'login.html';

        const products = [
            { id: 1, name: "Premium Headphones", price: 120, img: "./assets/headphone.png" },
            { id: 2, name: "Minimalist Watch", price: 85, img: "./assets/watch.png" },
            { id: 3, name: "Mechanical Keyboard", price: 150, img: "./assets/keyboard.png" },
            { id: 4, name: "Smart Phone", price: 45, img: "./assets/phone.png" },
            { id: 5, name: "Wireless Mouse", price: 30, img: "./assets/mouse.png" },
            { id: 6, name: "Leather Backpack", price: 75, img: "./assets/bag.png" },
            { id: 7, name: "Laptops", price: 75, img: "./assets/laptop.jpg" },
            { id: 8, name: "Earbuds", price: 75, img: "./assets/earbuds.jpg" },
        ];

        function displayProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <p class="price">$${p.price}</p>
                    <button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const product = products.find(p => p.id === id);
            const exists = cart.find(item => item.id === id);
            
            if(exists) {
                exists.quantity += 1;
            } else {
                cart.push({...product, quantity: 1});
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }

        displayProducts();
        updateCartCount();
    </script>
</body>
</html>
